<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <form>
        <p>Digite nome e sobrenome</p>
        <label for="fname">Primeiro Nome:</label><br>
        <input type="text" id="fname" name="fname"><br>
        <label for="lname">Sobrenome:</label><br>
        <input type="text" id="lname" name="lname">
        <p>Selecione seu gênero</p>
        <input type="radio" id="masculino" name="genero" value="Masculino">
        <label for="genero">Masculino</label><br>
        <input type="radio" id="feminino" name="genero" value="Feminino">
        <label for="genero">Feminino</label><br>
        <input type="radio" id="outros" name="genero" value="outros">
        <label for="genero">Outro/Prefiro Não Dizer</label><br>
        <p></p>
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
